name: Daily Backtest & Email

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-and-mail:
    runs-on: ubuntu-latest
    env:
      OUT_DIR: multi_param_outputs

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backtest script
        run: python multi_ticker_param_recommend.py

      - name: Upload CSV as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results-${{ github.run_id }}
          path: ${{ env.OUT_DIR }}/recommendations.csv
          retention-days: 7

      - name: Send recommendations by email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port:    ${{ secrets.SMTP_PORT }}
          username:       ${{ secrets.SMTP_USERNAME }}
          password:       ${{ secrets.SMTP_PASSWORD }}
          subject:        "📈 Daily Trading Recommendations - ${{ github.run_id }}"
          to:             ${{ secrets.EMAIL_TO }}
          from:           ${{ secrets.SMTP_USERNAME }}
          html_body:      file://${{ env.OUT_DIR }}/email_body.html
          secure: true
